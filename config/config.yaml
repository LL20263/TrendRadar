# ==========================================
# TrendRadar 配置文件 - QQ邮箱版（待命状态）
# ==========================================

# 推送模式：daily=每日汇总
mode: daily

# 定时规则：每天北京时间 8:00
schedule: "0 0 * * *"

# 监控平台（11个核心平台）
platforms:
  - weibo
  - zhihu
  - douyin
  - bilibili
  - toutiao
  - baidu
  - cls
  - wallstreet
  - sina
  - netease
  - github

# 关键词过滤
keywords:
  required: []
  excluded:
    - 广告
    - 推广
  include: []

# 推送渠道：QQ邮箱
channels:
  email:
    enabled: true
    smtp_server: "smtp.qq.com"
    smtp_port: 587
    username: ${{ secrets.EMAIL_USER }}
    password: ${{ secrets.EMAIL_PASS }}
    to: ${{ secrets.EMAIL_TO }}
    from: "TrendRadar <${{ secrets.EMAIL_USER }}>"
    subject: "[TrendRadar] 每日热点报告 {{date}}"

# 其他渠道关闭
  feishu:
    enabled: false
  telegram:
    enabled: false

# 数据存储
storage:
  enabled: true
  type: sqlite
  path: ./data/trendradar.db

# 日志
logging:
  level: INFO
  file: ./logs/trendradar.log
